apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      serviceAccountName: hacmieu-sa
      containers:
        - name: order-service
          image: public.ecr.aws/h5u5b6t3/hacmieu/order-service:latest
          imagePullPolicy: Always
          env:
            - name: ORDER_SERVICE_GRPC_URL
              value: '0.0.0.0:5004'
          envFrom:
            - secretRef:
                name: hacmieu-secrets
          ports:
            - containerPort: 3004
            - containerPort: 5004
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '500m'
              memory: '1Gi'
