apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iam-service
  template:
    metadata:
      labels:
        app: iam-service
    spec:
      serviceAccountName: hacmieu-sa
      containers:
        - name: iam-service
          image: public.ecr.aws/h5u5b6t3/hacmieu/iam-service:latest
          imagePullPolicy: Always
          env:
            - name: IAM_SERVICE_GRPC_URL
              value: '0.0.0.0:5001'
          envFrom:
            - secretRef:
                name: hacmieu-secrets
          ports:
            - containerPort: 3001
            - containerPort: 5001
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '500m'
              memory: '1Gi'
