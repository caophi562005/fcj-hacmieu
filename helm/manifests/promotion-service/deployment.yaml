apiVersion: apps/v1
kind: Deployment
metadata:
  name: promotion-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promotion-service
  template:
    metadata:
      labels:
        app: promotion-service
    spec:
      serviceAccountName: hacmieu-sa
      containers:
        - name: promotion-service
          image: public.ecr.aws/h5u5b6t3/hacmieu/promotion-service:latest
          imagePullPolicy: Always
          env:
            - name: PROMOTION_SERVICE_GRPC_URL
              value: '0.0.0.0:5006'
          envFrom:
            - secretRef:
                name: hacmieu-secrets
          ports:
            - containerPort: 3006
            - containerPort: 5006
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '500m'
              memory: '1Gi'
