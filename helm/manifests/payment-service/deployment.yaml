apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      serviceAccountName: hacmieu-sa
      containers:
        - name: payment-service
          image: public.ecr.aws/h5u5b6t3/hacmieu/payment-service:latest
          imagePullPolicy: Always
          env:
            - name: PAYMENT_SERVICE_GRPC_URL
              value: '0.0.0.0:5005'
          envFrom:
            - secretRef:
                name: hacmieu-secrets
          ports:
            - containerPort: 3005
            - containerPort: 5005
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '500m'
              memory: '1Gi'
