apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      serviceAccountName: hacmieu-sa
      containers:
        - name: catalog-service
          image: public.ecr.aws/h5u5b6t3/hacmieu/catalog-service:latest
          imagePullPolicy: Always
          env:
            - name: CATALOG_SERVICE_GRPC_URL
              value: '0.0.0.0:5002'
          envFrom:
            - secretRef:
                name: hacmieu-secrets
          ports:
            - containerPort: 3003
            - containerPort: 5002
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '500m'
              memory: '1Gi'
