syntax = "proto3";

option csharp_namespace = "Order";
package ORDER_SERVICE;

service OrderModule {
  rpc GetManyOrders(GetManyOrdersRequest) returns (GetManyOrdersResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc UpdateStatusOrder(UpdateStatusOrderRequest) returns (Order);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
}

service CartModule {
  rpc AddCartItem(AddCartItemRequest) returns (CartResponse);
  rpc UpdateCartItem(UpdateCartItemRequest) returns (CartResponse);
  rpc DeleteCartItem(DeleteCartItemRequest) returns (CartResponse);
  rpc ValidateCartItems(ValidateCartItemsRequest) returns (ValidateCartItemsResponse);
  rpc GetManyCartItems(GetManyCartItemsRequest) returns (GetManyCartItemsResponse);
}

message GetManyOrdersRequest {
  optional string processId = 1;
  int32 page = 2;
  int32 limit = 3;
  optional string paymentId = 4;
  optional string status = 5;
  optional string userId = 6;
  optional string shopId = 7;
}

message GetOrderRequest {
  optional string processId = 1;
  string orderId = 2;
  optional string userId = 3;
  optional string shopId = 4;
}

message CreateOrderRequest {
  optional string processId = 1;
  string userId = 2;
  int32 shippingFee = 3;
  optional string discountCode = 4;
  string paymentMethod = 5;
  Receiver receiver = 6;
  repeated OrderGroup orders = 7;
}

message Receiver {
  string name = 1;
  string phone = 2;
  string address = 3;
}

message OrderGroup {
  string shopId = 1;
  repeated string cartItemIds = 2;
}

message CreateOrderResponse {
  repeated Order orders = 1;
}

message GetManyOrdersResponse {
  int32 page = 1;
  int32 limit = 2;
  int32 totalItems = 3;
  int32 totalPages = 4;
  repeated OrderSummary orders = 5;
}

message OrderSummary {
  string id = 1;
  string code = 2;
  string shopId = 3;
  string shopName = 4;
  string status = 5;
  double itemTotal = 6;
  double grandTotal = 7;
  string firstProductImage = 8;
  string firstProductName = 9;
  string createdAt = 10;
}

message OrderItem {
  string id = 1;
  string orderId = 2;
  string productId = 3;
  string skuId = 4;
  string shopId = 5;
  string productName = 6;
  string skuValue = 7;
  int32 quantity = 8;
  double price = 9;
  double total = 10;
  string productImage = 11;
  string createdAt = 12;
  string updatedAt = 13;
}

message Timeline {
  string status = 1;
  string at = 2;
}

message Order {
  string id = 1;
  string code = 2;
  string userId = 3;
  string shopId = 4;
  string status = 5;
  double itemTotal = 6;
  double shippingFee = 7;
  double discount = 8;
  double grandTotal = 9;
  Receiver receiver = 10;
  string paymentMethod = 11;
  string paymentStatus = 12;
  string paymentId = 13;
  repeated Timeline timeline = 14;
  repeated OrderItem items = 15;
  optional string createdById = 16;
  optional string updatedById = 17;
  optional string deletedById = 18;
  optional string deletedAt = 19;
  string createdAt = 20;
  string updatedAt = 21;
}

message GetOrderResponse {
  string id = 1;
  string code = 2;
  string userId = 3;
  string shopId = 4;
  string shopName = 5;

  string status = 6;
  string paymentMethod = 7;
  string paymentStatus = 8;
  string paymentId = 9;

  double itemTotal = 10;
  double shippingFee = 11;
  double discount = 12;
  double grandTotal = 13;

  Receiver receiver = 14;
  string receiverName = 15;
  string receiverPhone = 16;
  string receiverAddress = 17;
  repeated Timeline timeline = 18;
  repeated OrderItemSnapshot itemsSnapshot = 19;
  string firstProductName = 20;
  string firstProductImage = 21;
  string createdAt = 22;
  string updatedAt = 23;
}

message OrderItemSnapshot {
  string id = 1;
  string productId = 2;
  string productImage = 3;
  string productName = 4;
  string skuValue = 5;
  int32 quantity = 6;
  double price = 7;
}

// ================================= Update status order ===================================
message UpdateStatusOrderRequest {
  optional string processId = 1;
  string id = 2;
  optional string userId = 3;
  optional string shopId = 4;
  string status = 5;
}

// ================================= Cancel order ===================================
message CancelOrderRequest {
  optional string processId = 1;
  string orderId = 2;
  optional string userId = 3;
  optional string shopId = 4;
}

message CancelOrderResponse {
  repeated Order orders = 1;
}

//==================== AddCartItem ====================//
message AddCartItemRequest {
  optional string processId = 1;
  string userId = 2;
  string productId = 3;
  string skuId = 4;
  string shopId = 5;
  int32 quantity = 6;
  string skuValue = 7;
  string productName = 8;
  optional string productImage = 9;
}

message CartItemResponse {
  string id = 1;
  string cartId = 2;
  string productId = 3;
  string skuId = 4;
  string shopId = 5;
  int32 quantity = 6;
  string productName = 7;
  string skuValue = 8;
  string productImage = 9;
  string createdAt = 10;
  string updatedAt = 11;
}

message CartResponse {
  CartItemResponse cartItem = 1;
  int32 cartCount = 2;
}

//==================== UpdateCartItem ====================//
message UpdateCartItemRequest {
 optional string processId = 1;
  string userId = 2;
  string productId = 3;
  string skuId = 4;
  string shopId = 5;
  int32 quantity = 6;
  string skuValue = 7;
  string productName = 8;
  optional string productImage = 9;
}

//==================== DeleteCartItem ====================//
message DeleteCartItemRequest {
  optional string processId = 1;
  string userId = 2;
  string cartItemId = 3;
}

//==================== ValidateCartItems ====================//
message ValidateCartItemsRequest {
  optional string processId = 1;
  repeated string cartItemIds = 2;
  string userId = 3;
}

message ValidateCartItemsResponse {
  repeated CartItemResponse cartItems = 1;
}

//==================== GetManyCartItems ====================//
message GetManyCartItemsRequest {
  optional string processId = 1;
  string userId = 2;
  int32 page = 3;
  int32 limit = 4;
}

message ShopCartItems {
  string shopId = 1;
  repeated CartItemResponse cartItems = 2;
}

message GetManyCartItemsResponse {
  repeated ShopCartItems cartItems = 1;
  int32 page = 2;
  int32 limit = 3;
  int32 totalItems = 4;
  int32 totalPages = 5;
}
