name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  id-token: write # bắt buộc cho OIDC

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      affected_apps: ${{ steps.set-matrix.outputs.affected_apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute affected apps matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD^"
              HEAD="HEAD"
            fi
          fi

          echo "Using BASE=$BASE HEAD=$HEAD"

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE" "$HEAD" || true)
          echo "Changed files:"
          printf '%s\n' "$CHANGED_FILES"

          # Service registry: name + dockerfile + path
          SERVICES_JSON='[
            {"name":"admin-bff","dockerfile":"apps/bffs/admin-bff/Dockerfile","path":"apps/bffs/admin-bff"},
            {"name":"customer-bff","dockerfile":"apps/bffs/customer-bff/Dockerfile","path":"apps/bffs/customer-bff"},
            {"name":"customer-web","dockerfile":"apps/webs/customer-web/Dockerfile","path":"apps/webs/customer-web"},
            {"name":"catalog-service","dockerfile":"apps/services/catalog-service/Dockerfile","path":"apps/services/catalog-service"},
            {"name":"iam-service","dockerfile":"apps/services/iam-service/Dockerfile","path":"apps/services/iam-service"},
            {"name":"order-service","dockerfile":"apps/services/order-service/Dockerfile","path":"apps/services/order-service"},
            {"name":"payment-service","dockerfile":"apps/services/payment-service/Dockerfile","path":"apps/services/payment-service"},
            {"name":"promotion-service","dockerfile":"apps/services/promotion-service/Dockerfile","path":"apps/services/promotion-service"},
            {"name":"shop-service","dockerfile":"apps/services/shop-service/Dockerfile","path":"apps/services/shop-service"},
            {"name":"utility-service","dockerfile":"apps/services/utility-service/Dockerfile","path":"apps/services/utility-service"},
            {"name":"wallet-service","dockerfile":"apps/services/wallet-service/Dockerfile","path":"apps/services/wallet-service"}
          ]'

          # Nếu có file thay đổi dưới libs/ hoặc root config quan trọng → affect tất cả services
          GLOBAL_CHANGED=$(printf '%s\n' "$CHANGED_FILES" \
            | grep -E '^(libs/|tsconfig\.|nx\.json|pnpm-workspace\.yaml)' || true)

          if [ -n "$GLOBAL_CHANGED" ]; then
            echo "Global file changed → affect ALL services."
            AFFECTED_APPS_JSON=$(echo "$SERVICES_JSON" | jq -c '[.[].name]')
          else
            # Path-based: mỗi service check xem có file thay đổi nảo nằm dưới path của nó không
            AFFECTED_APPS_JSON=$(echo "$SERVICES_JSON" | jq -c \
              --arg files "$CHANGED_FILES" \
              '[.[] | select(.path as $p | $files | split("\n") | any(startswith($p + "/"))) | .name]')
          fi

          echo "Affected apps: $AFFECTED_APPS_JSON"
          echo "affected_apps=$AFFECTED_APPS_JSON" >> "$GITHUB_OUTPUT"

          if [ "$AFFECTED_APPS_JSON" = "[]" ]; then
            echo "No affected apps."
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX=$(jq -nc \
            --argjson affected "$AFFECTED_APPS_JSON" \
            --argjson services "$SERVICES_JSON" \
            '{include: ($services | map(select(.name as $n | $affected | index($n) != null) | {name, dockerfile}))}')

          echo "matrix=$MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    needs: check
    if: ${{ fromJson(needs.check.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Generate tag
        id: tag
        shell: bash
        run: echo "TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and Push to ECR Public
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        env:
          IMAGE: public.ecr.aws/h5u5b6t3/hacmieu/${{ matrix.name }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          set -euo pipefail
          docker build \
            -f "${{ matrix.dockerfile }}" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$TAG" \
            .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$TAG"

      - name: Prune old ECR images (keep 3 latest)
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        env:
          REPO: hacmieu/${{ matrix.name }}
          KEEP: 3
        run: |
          set -euo pipefail

          # ECR Public chạy trên us-east-1 (global endpoint)
          ALL_DIGESTS=$(aws ecr-public describe-images \
            --repository-name "$REPO" \
            --region us-east-1 \
            --query 'sort_by(imageDetails,&imagePushedAt)[*].imageDigest' \
            --output text | tr '\t' '\n' | sed '/^$/d')

          TOTAL=$(printf '%s\n' "$ALL_DIGESTS" | grep -c . || true)
          echo "Total images in $REPO: $TOTAL (keep latest $KEEP)"

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Nothing to prune."
            exit 0
          fi

          DELETE_COUNT=$((TOTAL - KEEP))
          # Sorted ascending (cũ nhất trước) → lấy phần đầu để xoá
          TO_DELETE=$(printf '%s\n' "$ALL_DIGESTS" | head -n "$DELETE_COUNT")
          echo "Deleting $DELETE_COUNT old image(s):"
          printf '%s\n' "$TO_DELETE"

          # Build --image-ids args dạng imageDigest=sha256:...
          IDS=()
          while IFS= read -r digest; do
            [ -z "$digest" ] && continue
            IDS+=("imageDigest=$digest")
          done <<< "$TO_DELETE"

          aws ecr-public batch-delete-image \
            --repository-name "$REPO" \
            --region us-east-1 \
            --image-ids "${IDS[@]}"

      - name: Build only (PR validation)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        env:
          IMAGE: public.ecr.aws/h5u5b6t3/hacmieu/${{ matrix.name }}
        run: |
          set -euo pipefail
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE:pr" .
