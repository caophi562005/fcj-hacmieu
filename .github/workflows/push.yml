name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  id-token: write # bắt buộc cho OIDC

jobs:
  install:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      affected_apps: ${{ steps.set-matrix.outputs.affected_apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Configure Git protocol
        run: git config --global url."https://github.com/".insteadOf git://github.com/

      - name: Cache pnpm store
        id: cache-pnpm-store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute affected apps matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD^"
              HEAD="HEAD"
            fi
          fi

          echo "Using BASE=$BASE HEAD=$HEAD"

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE" "$HEAD" || true)
          FILTERED_FILES=$(printf '%s\n' "$CHANGED_FILES" \
            | grep -Ev '^(package\.json|pnpm-lock\.yaml)$' \
            | paste -sd, -)

          if [ -z "$FILTERED_FILES" ]; then
            echo "Only package.json / pnpm-lock.yaml changed (or no relevant files)."
            echo 'affected_apps=[]' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AFFECTED_LINES=$(pnpm nx show projects --affected --files="$FILTERED_FILES" --type=app || true)

          if [ -z "$AFFECTED_LINES" ]; then
            echo "No affected apps."
            echo 'affected_apps=[]' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AFFECTED_APPS_JSON=$(printf '%s\n' "$AFFECTED_LINES" | jq -R -s -c 'split("\n") | map(select(length>0))')
          echo "Affected apps: $AFFECTED_APPS_JSON"
          echo "affected_apps=$AFFECTED_APPS_JSON" >> "$GITHUB_OUTPUT"

          SERVICES_JSON='[
            {"name":"admin-bff","dockerfile":"apps/bffs/admin-bff/Dockerfile"},
            {"name":"customer-bff","dockerfile":"apps/bffs/customer-bff/Dockerfile"},
            {"name":"catalog-service","dockerfile":"apps/services/catalog-service/Dockerfile"},
            {"name":"iam-service","dockerfile":"apps/services/iam-service/Dockerfile"},
            {"name":"order-service","dockerfile":"apps/services/order-service/Dockerfile"},
            {"name":"payment-service","dockerfile":"apps/services/payment-service/Dockerfile"},
            {"name":"promotion-service","dockerfile":"apps/services/promotion-service/Dockerfile"},
            {"name":"shop-service","dockerfile":"apps/services/shop-service/Dockerfile"},
            {"name":"utility-service","dockerfile":"apps/services/utility-service/Dockerfile"}
          ]'

          MATRIX=$(jq -nc \
            --argjson affected "$AFFECTED_APPS_JSON" \
            --argjson services "$SERVICES_JSON" \
            '{include: ($services | map(select(.name as $n | $affected | index($n) != null)))}')

          echo "matrix=$MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: install
    if: ${{ fromJson(needs.install.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.install.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: .

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Generate tag
        id: tag
        shell: bash
        run: echo "TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and Push to ECR Public
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        env:
          IMAGE: public.ecr.aws/h5u5b6t3/hacmieu/${{ matrix.name }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          set -euo pipefail
          docker build \
            -f "${{ matrix.dockerfile }}" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$TAG" \
            .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$TAG"

      - name: Build only (PR validation)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        env:
          IMAGE: public.ecr.aws/h5u5b6t3/hacmieu/${{ matrix.name }}
        run: |
          set -euo pipefail
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE:pr" .
